<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#4285f4">
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Favicon PNG -->
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    
    <title>Заметки (Практика 16)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Заметки - оффлайн-приложение</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
        <div id="connection-status" class="tag is-success" style="margin-top: 1rem;">
            🟢 Онлайн
        </div>
    </header>

    <!-- Основной контейнер для динамического контента -->
    <main id="app-content" class="container" style="margin-top: 2rem;">
        <!-- Сюда будет загружаться контент -->
    </main>

    <footer class="is-center" style="margin-top: 2rem; padding: 1rem;">
        <button id="enable-push" class="button success">🔔 Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">🔕 Отключить уведомления</button>
        <p style="margin-top: 1rem; color: #666;">
            ИПТИП, Кафедра Индустриального Программирования<br>
            4 семестр, 2025/2026 уч. год
        </p>
    </footer>

    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
